name: app
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets: 
    - lib/assets/fonts/

  fonts:
    - family: Comic-Relief
      fonts:
        - asset: lib/assets/fonts/ComicRelief-Regular.ttf
        - asset: lib/assets/fonts/ComicRelief-Bold.ttf
